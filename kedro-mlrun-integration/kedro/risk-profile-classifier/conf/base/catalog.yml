# Data Catalog for Risk Profile Classifier
# Documentation: https://docs.kedro.org/en/stable/data/data_catalog.html

# ===========================
# Training Pipeline Datasets
# ===========================

# Raw user data (loaded from CSV)
raw_user_data:
  type: pandas.CSVDataset
  filepath: data/raw/user_data.csv

# Feature scaler (saved during training, used in serving)
feature_scaler:
  type: pickle.PickleDataset
  filepath: data/models/feature_scaler.pkl

# Trained risk profile classifier model
risk_classifier:
  type: pickle.PickleDataset
  filepath: data/models/risk_classifier.pkl

# Model evaluation metrics
model_metrics:
  type: json.JSONDataset
  filepath: data/reporting/model_metrics.json

# ===========================
# Serving Pipeline Datasets
# ===========================

# Input user data for prediction (from HTTP request or parameters)
user_input:
  type: MemoryDataset
  metadata:
    nuclio_event: true  # Populate from event.body

# Predictions output (in-memory for HTTP response)
predictions:
  type: MemoryDataset
  metadata:
    nuclio_response: true  # Return this in HTTP response
