# Langfuse environment: binds the generic dataset names (intent_prompt,
# intent_tracer, autogen_tracer, llm/llm_openai/llm_autogen, tool_prompt,
# response_prompt) to Langfuse-backed implementations. The opik equivalent
# in conf/opik/ defines the same names backed by Opik. Pipelines reference
# only the generic names, so switching providers is `--env langfuse|opik`.

# --- LLMs setup ---
llm:
  type: langchain.ChatOpenAIDataset
  kwargs:
    model: ${runtime_params:model_name, gpt-4o}
    temperature: 0.0
  credentials: openai

llm_openai:
  type: kedro_agentic_workflows.datasets.openai_model_dataset.OpenAIModelDataset
  model_name: "gpt-4o"
  model_settings:
    temperature: 0.0
  credentials: openai

llm_autogen:
  type: kedro_agentic_workflows.datasets.autogen_model_client.OpenAIChatCompletionClientDataset
  kwargs:
    model: "gpt-4o"
    temperature: 0.0
  credentials: openai

# --- Prompts ---
tool_prompt:
  type: kedro_datasets_experimental.langchain.PromptDataset
  filepath: data/response_generation/prompts/tool.txt
  template: PromptTemplate
  dataset:
    type: text.TextDataset

response_prompt:
  type: kedro_datasets_experimental.langchain.PromptDataset
  filepath: data/response_generation/prompts/response.yml
  template: ChatPromptTemplate
  dataset:
    type: yaml.YAMLDataset

intent_prompt:
  type: kedro_datasets_experimental.langfuse.PromptDataset
  filepath: data/intent_detection/prompts/intent_prompt_langfuse.json
  prompt_name: "intent-classifier"
  prompt_type: "chat"
  credentials: langfuse_credentials
  sync_policy: local        # local | remote | strict
  mode: sdk                 # sdk preserves Langfuse-side prompt-version tracking;
                            # the agent duck-types the returned object into a LangChain template
  load_args:
    version: ${runtime_params:intent_prompt_version, 1}

# --- Tracing ---
intent_tracer:
  type: kedro_datasets_experimental.langfuse.TraceDataset
  credentials: langfuse_credentials
  mode: langchain           # returns a LangChain CallbackHandler used in session_config

autogen_tracer:
  type: kedro_datasets_experimental.langfuse.TraceDataset
  credentials: langfuse_credentials
  mode: autogen             # returns an OpenTelemetry Tracer (start_as_current_span)
