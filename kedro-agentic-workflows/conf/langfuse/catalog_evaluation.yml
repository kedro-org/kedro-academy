# Langfuse environment: evaluation pipeline catalog (default env).
# The intent_detection_evaluation pipeline reads these. The Opik mirror is in
# conf/opik/catalog_evaluation.yml — both eval pipelines use the same generic
# dataset names; only the bindings differ per env.

intent_evaluation_data:
  type: kedro_datasets_experimental.langfuse.EvaluationDataset
  dataset_name: evaluations/intent_agent_evaluation
  filepath: data/intent_detection/evaluation/intent_evaluation.json
  sync_policy: local
  credentials: langfuse_credentials
  metadata:
    created_by: kedro

intent_judge_llm:
  type: langchain.ChatOpenAIDataset
  kwargs:
    model: "gpt-4o"
    temperature: 0.0
  credentials: openai

intent_judge_prompt:
  type: kedro_datasets_experimental.langfuse.PromptDataset
  filepath: data/intent_detection/evaluation/prompts/intent_judge_llm_prompt.json
  prompt_name: "intent_llm_judge_evaluator_prompt"
  prompt_type: "chat"
  credentials: langfuse_credentials
  sync_policy: local       # local|remote|strict
  mode: langchain          # langchain|sdk

langfuse_client:
  type: kedro_datasets_experimental.langfuse.TraceDataset
  credentials: langfuse_credentials
  mode: sdk    # langchain | openai | sdk
