# Opik environment: binds the provider-specific generic names
# (intent_prompt, intent_tracer, autogen_tracer) to Opik-backed
# implementations. Shared catalog entries (llm, tool_prompt, response_prompt,
# etc.) live in conf/base/catalog_genai_config.yml.

intent_prompt:
  type: kedro_datasets_experimental.opik.PromptDataset
  filepath: data/intent_detection/prompts/intent_prompt_opik.json
  prompt_name: "intent-classifier"
  prompt_type: "chat"
  credentials: opik_credentials
  sync_policy: local        # local | remote | strict
  mode: langchain           # Opik's sdk mode does not yet support version loading;
                            # langchain mode returns a ChatPromptTemplate directly

intent_tracer:
  type: kedro_datasets_experimental.opik.TraceDataset
  credentials: opik_credentials
  mode: langchain           # returns an OpikTracer callback used in session_config
  # TEMP forces the OpikTracer's project. opik.TraceDataset's _configure_opik
  # sets OPIK_PROJECT_NAME, but configure(force=True) overrides it, so the
  # project_name in opik_credentials never reaches OpikTracer in langchain mode.
  # Passing it here as a trace_kwarg is the only path that lands traces in the
  # right project today. Tracked alongside the upstream Opik fixes
  # (https://github.com/kedro-org/kedro-plugins/pull/1416). Once a kedro-datasets
  # release ships a _load_langchain_tracer that forwards credentials.project_name
  # to OpikTracer automatically, delete this line — opik_credentials.project_name
  # will flow through on its own.
  project_name: kedro-agentic-test

# TEMP uses a separate credentials block as a workaround for an upstream bug.
# opik.PromptDataset and opik.EvaluationDataset (kedro-datasets 9.4.0) splat
# the whole credentials dict into Opik(**credentials), which doesn't accept
# `endpoint`. Isolating `endpoint` here keeps the other Opik datasets working.
# Upstream fix: https://github.com/kedro-org/kedro-plugins/pull/1416
# Once that merges and ships in a kedro-datasets release > 9.4.0:
#   1. point `credentials:` back to `opik_credentials`
#   2. delete this comment
#   3. drop the `opik_credentials_autogen` block from credentials.yml.template
autogen_tracer:
  type: kedro_datasets_experimental.opik.TraceDataset
  credentials: opik_credentials_autogen
  mode: autogen             # returns an OpenTelemetry Tracer (start_as_current_span)
