intent_evaluation_data:
  type: kedro_datasets_experimental.langfuse.LangfuseEvaluationDataset
  dataset_name: evaluations/intent_agent_evaluation
  filepath: data/intent_detection/evaluation/intent_evaluation.json
  sync_policy: local
  credentials: langfuse_credentials
  metadata:
    created_by: kedro

intent_judge_llm:
  type: langchain.ChatOpenAIDataset
  kwargs:
    model: "gpt-4o"
    temperature: 0.0
  credentials: openai

intent_judge_prompt:
  type: kedro_datasets_experimental.langfuse.LangfusePromptDataset
  filepath: data/intent_detection/evaluation/prompts/intent_judge_llm_prompt.json
  prompt_name: "intent_llm_judge_evaluator_prompt"
  prompt_type: "chat"
  credentials: langfuse_credentials
  sync_policy: local       # local|remote|strict
  mode: langchain          # langchain|sdk

langfuse_client:
  type: kedro_datasets_experimental.langfuse.LangfuseTraceDataset
  credentials: langfuse_credentials
  mode: sdk    # langchain | openai | sdk