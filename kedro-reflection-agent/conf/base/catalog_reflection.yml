# Catalog entries used by the `reflection` pipeline.
#
# Inputs:
#   - meta-agent prompt:  data/reflection/prompts/meta_agent_prompt.json  (Langfuse-backed)
#   - current prompt:     reuses campaign input (system_prompt)
#   - current skill:      reuses campaign input (skill_text)
#   - traces + scores:    fetched from Langfuse / read from data/outputs/runs/{run_id}/
#                         (per_case_scores, aggregate_scores reused from catalog_evaluation.yml)
#   - eval_cases:         reused from catalog_evaluation.yml (DatasetClient, .items iterated)
#
# Outputs (per reflection_id):
#   - summary:            data/outputs/reflections/{reflection_id}/summary.md
#   - proposed prompt:    data/outputs/reflections/{reflection_id}/proposed_prompt.json
#   - proposed skill:     data/outputs/reflections/{reflection_id}/proposed_skill.md
#   - proposed eval cases:data/outputs/reflections/{reflection_id}/proposed_eval_cases.json


# --- Meta-agent LLM -----------------------------------------------------------

meta_agent_llm:
  type: langchain.ChatOpenAIDataset
  kwargs:
    model: ${runtime_params:meta_agent_model_name, gpt-4o}
    temperature: 0.3
  credentials: openai


# --- Meta-agent prompt (Langfuse-backed, cached locally) ----------------------

meta_agent_prompt:
  type: kedro_datasets_experimental.langfuse.LangfusePromptDataset
  filepath: data/reflection/prompts/meta_agent_prompt.json
  prompt_name: "b2b-email-meta-agent-prompt"
  prompt_type: "chat"
  credentials: langfuse_credentials
  sync_policy: local    # local | remote | strict
  mode: langchain       # returns a ChatPromptTemplate directly
  load_args:
    version: ${runtime_params:meta_agent_prompt_version, 1}


# --- Outputs (per reflection_id) ----------------------------------------------

# The ,refl_1 fallback in each filepath mirrors parameters.yml → reflection_id.
# If you change the default there, update the four fallbacks below to match.
reflection_summary:
  type: text.TextDataset
  filepath: data/outputs/reflections/${runtime_params:reflection_id,refl_1}/summary.md

proposed_prompt:
  type: json.JSONDataset
  filepath: data/outputs/reflections/${runtime_params:reflection_id,refl_1}/proposed_prompt.json

proposed_skill:
  type: text.TextDataset
  filepath: data/outputs/reflections/${runtime_params:reflection_id,refl_1}/proposed_skill.md

proposed_eval_cases:
  type: kedro_datasets_experimental.langfuse.LangfuseEvaluationDataset
  dataset_name: "b2b-campaign-agent-eval"
  filepath: data/outputs/reflections/${runtime_params:reflection_id,refl_1}/proposed_eval_cases.json
  sync_policy: local
  credentials: langfuse_credentials
  metadata:
    created_by: kedro
