# Catalog entries used by the `agent_run` pipeline.
#
# Inputs:
#   - seed data:        data/seed/customers.json, data/seed/products.json
#   - system prompt:    data/agent_run/prompts/system_prompt.json  (Langfuse-backed)
#   - skill file:       data/agent_run/skills/b2b_email_style.md   (disk only)
#   - eval cases:       data/agent_run/eval_cases.json             (Langfuse-backed)
#
# Outputs (per run_id):
#   - emails:           data/outputs/runs/{run_id}/emails/
#   - run metadata:     data/outputs/runs/{run_id}/run_metadata.json
#   - traces:           emitted to Langfuse (not stored locally)
