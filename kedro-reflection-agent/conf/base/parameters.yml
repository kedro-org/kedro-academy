# Defaults for all pipelines. Override via `--params key=value` on the CLI.

# --- campaign ---------------------------------------------------------------

# Pinned run identifier; controls where outputs are written under
# data/outputs/runs/<run_id>/. The Streamlit demo pins this to run_1 / run_2.
run_id: default

# OpenAI model used by the agent.
model_name: gpt-4o-mini

# Version of the Langfuse-stored system prompt to load.
system_prompt_version: 1


# --- evaluation -------------------------------------------------------------

# OpenAI model used by the LLM judge. Deliberately bigger than the campaign
# model so scores are steadier.
judge_model_name: gpt-4o

# Version of the Langfuse-stored judge prompt to load.
judge_prompt_version: 1

# Per-case mean score threshold; cases at or above this count toward n_passing.
# Tuned for the v0 baseline: the 4 deterministic heuristics always score 1.0
# (subject/length/no-fake-skus/cta), so the meaningful signal lives in the 3
# LLM-judged dimensions. With the v0 emails, per-case mean ranges 0.83-0.96
# (median 0.93). A 0.92 threshold puts the bar where personalization weakness
# actually moves the needle, giving reflection a visible pass-rate target.
passing_threshold: 0.92

# Heuristic body-length bounds, in characters.
body_length_min: 300
body_length_max: 2000


# --- scouts -----------------------------------------------------------------

# score_regression: fires when any scored dimension drops more than this many
# points (0-1 scale) vs the rolling average of the last N runs.
scout_regression_delta_medium: 0.10   # delta > 0.10 → medium confidence
scout_regression_delta_high:   0.20   # delta > 0.20 → high confidence
scout_regression_window:       5      # number of past runs to average over

# rubric_miss: fires when a rubric-derived heuristic (cta_present,
# subject_present, no_fake_skus) scores 0.0 on ≥ this many cases.
scout_rubric_miss_min_cases: 2

# hallucination_flag: fires when no_fake_skus == 0.0 on ≥ this many cases.
scout_hallucination_min_cases: 1

# tone_drift: fires when a quality/tone dimension falls below this floor
# for ≥ this many consecutive cases (sorted by case_id for stability).
scout_tone_floor: 0.70
scout_tone_min_cases: 3

# cross_unit_pattern: fires when the same signal_type appears in ≥ this many
# distinct agents within the last N runs in the signal index.
scout_cross_unit_min_agents: 2
scout_cross_unit_window: 10


# --- reflection -------------------------------------------------------------

# Pinned reflection identifier; controls where artifacts are written under
# data/outputs/reflections/<reflection_id>/.
reflection_id: refl_1

# OpenAI model used by the reflection meta-agent.
meta_agent_model_name: gpt-4o

# Version of the Langfuse-stored meta-agent prompt to load.
meta_agent_prompt_version: 1
